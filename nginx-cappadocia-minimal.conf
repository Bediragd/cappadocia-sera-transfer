# Cappadocia - minimal (cache yok, diğer projelere dokunmaz)
# Statik dosyalar (logo, resimler, _next/chunks) Nginx'ten; diğer istekler Next.js'e
# Sadece bu dosyayı kullanacaksan: sudo cp nginx-cappadocia-minimal.conf /etc/nginx/sites-available/cappadocia

server {
    listen 80;
    server_name cappadociaseratransfer.com www.cappadociaseratransfer.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    # Next.js static chunks (404 ve "Failed to load chunk" önlemi)
    location /_next/static/ {
        alias /home/bedir/cappadocia-sera-transfer/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # public/ içeriği: logo, favicon, resimler
    location / {
        root /home/bedir/cappadocia-sera-transfer/public;
        try_files $uri $uri/ @nextjs;
    }
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name cappadociaseratransfer.com www.cappadociaseratransfer.com;
    ssl_certificate /etc/letsencrypt/live/cappadociaseratransfer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cappadociaseratransfer.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    # Next.js static chunks
    location /_next/static/ {
        alias /home/bedir/cappadocia-sera-transfer/.next/static/;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    # public/ içeriği
    location / {
        root /home/bedir/cappadocia-sera-transfer/public;
        try_files $uri $uri/ @nextjs;
    }
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
