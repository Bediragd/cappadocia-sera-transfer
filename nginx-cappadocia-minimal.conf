# Cappadocia - minimal (cache yok, diğer projelere dokunmaz)
# Sadece bu dosyayı kullanacaksan: sudo cp nginx-cappadocia-minimal.conf /etc/nginx/sites-available/cappadocia

proxy_cache_path /var/cache/nginx/cappadocia levels=1:2 keys_zone=cappadocia_cache:10m max_size=100m inactive=60m use_temp_path=off;

server {
    listen 80;
    server_name cappadociaseratransfer.com www.cappadociaseratransfer.com;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name cappadociaseratransfer.com www.cappadociaseratransfer.com;
    ssl_certificate /etc/letsencrypt/live/cappadociaseratransfer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cappadociaseratransfer.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
