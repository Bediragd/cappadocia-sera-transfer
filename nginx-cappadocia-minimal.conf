# Cappadocia - Docker + Next.js standalone
#
# /_next  → container (build icinde)
# /uploads → host public/uploads (runtime yuklemeler; nginx dogrudan sunar)
#
# Izin: docker-entrypoint chmod a+rX yapar; yine de sorun olursa:
#   sudo chmod -R a+rX /home/bedir/cappadocia-sera-transfer/public/uploads
#
# Kurulum: sudo cp nginx-cappadocia-minimal.conf /etc/nginx/sites-available/cappadocia
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name cappadociaseratransfer.com www.cappadociaseratransfer.com;
    client_max_body_size 60m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location /uploads/ {
        alias /home/bedir/cappadocia-sera-transfer/public/uploads/;
        add_header Cache-Control "private, max-age=3600";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

server {
    listen 443 ssl;
    server_name cappadociaseratransfer.com www.cappadociaseratransfer.com;
    client_max_body_size 60m;
    ssl_certificate /etc/letsencrypt/live/cappadociaseratransfer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cappadociaseratransfer.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location /uploads/ {
        alias /home/bedir/cappadocia-sera-transfer/public/uploads/;
        add_header Cache-Control "private, max-age=3600";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
